<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CV - Bùi Dương Trí</title>

    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: #f2f4f7;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 650px;
            margin: 80px auto;
            padding: 0 20px;
            text-align: center;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #222;
        }

        p {
            color: #555;
            margin-bottom: 30px;
        }

        .card {
            background: #fff;
            padding: 20px 26px;
            border-radius: 14px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
            transition: 0.2s;
            cursor: pointer;
            display: inline-block;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        a {
            text-decoration: none;
            color: #222;
            font-size: 18px;
            font-weight: 600;
        }

        .sub {
            font-size: 13px;
            color: #666;
            margin-top: 6px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Curriculum Vitae</h1>
        <p>Bấm để xem CV đầy đủ (PDF)</p>

        <div class="card" onclick="openPDF('Bùi_Dương_Trí.pdf')">
            <a href="Bùi_Dương_Trí.pdf" target="_blank">Xem CV</a>
            <div class="sub">Mở file PDF trong tab mới</div>
        </div>
    </div>

    <script>
        function openPDF(file) {
            window.open(file, '_blank');
        }
    </script>

</body>
</html>
