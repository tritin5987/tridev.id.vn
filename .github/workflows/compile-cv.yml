name: Compile LaTeX CV

on:
  push:
    paths:
      - 'cv/cv.tex'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv/cv.tex

      - name: Copy compiled PDF to assets
        run: |
          mkdir -p assets/docs
          if [ -f cv/cv.pdf ]; then
            cp cv/cv.pdf "assets/docs/Bui_Duong_Tri.pdf"
          elif [ -f cv.pdf ]; then
            cp cv.pdf "assets/docs/Bui_Duong_Tri.pdf"
          else
            echo "Error: cv.pdf not found."
            exit 1
          fi

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-compile LaTeX CV to PDF [skip ci]"
          file_pattern: "assets/docs/Bui_Duong_Tri.pdf"
